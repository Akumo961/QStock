<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Scouts Musulmans de Montréal - Inventaire QR</title>
    <meta name="description" content="Système de gestion d'inventaire par codes QR pour les Scouts Musulmans de Montréal." />
    <meta name="theme-color" content="#1b4332" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="QR Inventaire" />

    <link rel="icon" type="image/png" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="manifest" href="/manifest.json" />

    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        background: #f4f7f6;
      }

      /* Loading screen */
      #app-loading {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #52b788 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        transition: opacity 0.5s ease-out;
      }

      #app-loading img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        background: white;
        border-radius: 50%;
        padding: 8px;
        margin-bottom: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }

      #app-loading h1 {
        font-size: 1.3rem;
        font-weight: 800;
        margin: 0 0 4px 0;
        text-align: center;
      }

      #app-loading p {
        font-size: 0.85rem;
        opacity: 0.8;
        margin: 0 0 28px 0;
        text-align: center;
      }

      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      .loading-label {
        margin-top: 14px;
        font-size: 0.85rem;
        opacity: 0.75;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: 0.75; } 50% { opacity: 0.35; } }

      /* Fade out loading when React mounts */
      body.app-loaded #app-loading {
        opacity: 0;
        pointer-events: none;
      }

      #root {
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }

      #root.loaded { opacity: 1; overflow: auto; }
    </style>
  </head>

  <body>
    <!-- Loading Screen (Scout branded) -->
    <div id="app-loading">
      <img src="/logo.jpg" alt="Scouts Musulmans de Montréal" />
      <h1>Scouts Musulmans de Montréal</h1>
      <p>Système d'inventaire QR</p>
      <div class="loading-spinner"></div>
      <div class="loading-label">Chargement...</div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script>
      // Show React app once loaded
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.body.classList.add('app-loaded');
          const root = document.getElementById('root');
          if (root) root.classList.add('loaded');
        }, 600);
      });

      /*
       * SERVICE WORKER: intentionally NOT registered here.
       *
       * The old code registered /sw.js from both index.html AND main.tsx,
       * causing two conflicting SWs. The stale SW intercepted all navigation
       * requests and served a cached blank/static page — making every button
       * unclickable and the app appear frozen.
       *
       * SW registration is handled exclusively by vite-plugin-pwa in
       * production builds. In development (npm run dev), the SW is disabled
       * via pwa-config.js devOptions.enabled = false.
       *
       * DO NOT add serviceWorker.register() back here.
       */

      // PWA install prompt (no SW registration needed for this)
      let deferredPrompt;
      <br>window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        window.deferredPrompt = deferredPrompt;
      });
      window.addEventListener('appinstalled', () => { deferredPrompt = null; });

      // Online/Offline detection
      window.addEventListener('online', () => { if (window.updateOnlineStatus) window.updateOnlineStatus(true); });
      window.addEventListener('offline', () => { if (window.updateOnlineStatus) window.updateOnlineStatus(false); });
    </script>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>

    <noscript>
      <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f5;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px;font-family:sans-serif;">
        <div>
          <h1 style="color:#1b4332;">⚠️ JavaScript requis</h1>
          <p style="color:#666;">Veuillez activer JavaScript dans votre navigateur et recharger la page.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
